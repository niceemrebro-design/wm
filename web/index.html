<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>WM 2026 — Orakel</title>
<style>
  :root{
    --bg:#0c1018; --card:#151b27; --card2:#1b2330; --line:#26303f;
    --txt:#e7ecf3; --muted:#8a97aa; --accent:#41d18a; --home:#4a8cff;
    --draw:#9aa6b8; --away:#ff7a59; --gold:#f4c84a;
  }
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--txt);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    line-height:1.5}
  .wrap{max-width:1080px;margin:0 auto;padding:24px 18px 64px}
  header h1{margin:0 0 4px;font-size:30px;letter-spacing:.3px}
  header .sub{color:var(--muted);font-size:14px;margin-bottom:6px}
  .meta{color:var(--muted);font-size:12px}
  .grid{display:grid;grid-template-columns:1fr;gap:14px;margin-top:18px}
  @media(min-width:760px){.grid{grid-template-columns:1fr 1fr}}
  .daterow{grid-column:1/-1;margin:14px 0 2px;color:var(--gold);font-weight:600;font-size:14px;
    text-transform:uppercase;letter-spacing:1px}
  .card{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:16px 16px 14px}
  .top{display:flex;justify-content:space-between;align-items:center;gap:10px}
  .teams{font-weight:600;font-size:16px}
  .city{color:var(--muted);font-size:12px;margin-top:2px}
  .score{font-size:30px;font-weight:800;letter-spacing:1px;white-space:nowrap}
  .conf{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;
    padding:3px 8px;border-radius:999px;white-space:nowrap}
  .c-hoch{background:#123b2a;color:#5fe0a3}
  .c-mittelhoch{background:#103436;color:#56d6c8}
  .c-mittel{background:#16294a;color:#7fb0ff}
  .c-niedrigmittel{background:#3a3216;color:#e9c66a}
  .c-niedrig{background:#322a2a;color:#d7a08f}
  .bar{display:flex;height:8px;border-radius:6px;overflow:hidden;margin:12px 0 6px}
  .bar span{display:block}
  .bar .h{background:var(--home)} .bar .d{background:var(--draw)} .bar .a{background:var(--away)}
  .pl{display:flex;justify-content:space-between;font-size:11px;color:var(--muted)}
  .reason{font-size:13.5px;color:#d4dbe6;margin:10px 0}
  .chips{display:flex;flex-wrap:wrap;gap:6px;margin:8px 0}
  .chip{font-size:11px;background:var(--card2);border:1px solid var(--line);color:#bcc7d6;
    padding:3px 8px;border-radius:8px}
  .upset{font-size:12.5px;background:#241a12;border-left:3px solid var(--away);
    padding:8px 10px;border-radius:0 8px 8px 0;color:#ecc9b6;margin-top:8px}
  .upset b{color:var(--away)}
  .statline{font-size:11px;color:var(--muted);margin-top:10px;border-top:1px dashed var(--line);padding-top:8px}
  .result{margin-top:8px;font-size:13px;font-weight:700}
  .hit{color:var(--accent)} .miss{color:var(--away)}
  .side{margin-top:34px}
  .side h2{font-size:16px;margin:0 0 10px}
  .elo{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:6px}
  .erow{display:flex;justify-content:space-between;background:var(--card);border:1px solid var(--line);
    border-radius:8px;padding:6px 10px;font-size:13px}
  .erow .r{color:var(--muted);width:22px} .erow .v{color:var(--gold);font-variant-numeric:tabular-nums}
  footer{color:var(--muted);font-size:11px;margin-top:40px;text-align:center}
  .legend{font-size:11px;color:var(--muted);margin-top:6px}
  .legend b.h{color:var(--home)} .legend b.d{color:var(--draw)} .legend b.a{color:var(--away)}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <h1>⚽ WM 2026 — Orakel</h1>
    <div class="sub">KI-gestützte Vorhersagen auf Basis von 154 Jahren Fußball-Historie. Die KI urteilt, die Statistik ist ihr Werkzeug.</div>
    <div class="meta" id="meta"></div>
    <div class="legend">Wahrscheinlichkeit: <b class="h">Heim</b> · <b class="d">Remis</b> · <b class="a">Auswärts</b></div>
  </header>

  <div class="grid" id="cards"></div>

  <div class="side">
    <h2>🏆 Kraftrangliste (Elo) — alle 48 Teilnehmer</h2>
    <div class="elo" id="elo"></div>
  </div>

  <footer id="foot"></footer>
</div>

<script src="data.js"></script>
<script>
const D = window.WM_DATA || {predictions:[],elo_top:[],meta:{}};
const confClass = c => 'c-' + (c||'').replace(/[^a-zä]/gi,'').replace('ä','a');
const pct = x => Math.round((x||0)*100) + '%';

function card(p){
  const score = `${p.pick.home}:${p.pick.away}`;
  const sm = p.stat_model || {};
  let resHtml = '';
  if(p.result){
    const ok = p.result.home===p.pick.home && p.result.away===p.pick.away;
    const tend = Math.sign(p.pick.home-p.pick.away)===Math.sign(p.result.home-p.result.away);
    resHtml = `<div class="result ${ok?'hit':(tend?'hit':'miss')}">Endstand: ${p.result.home}:${p.result.away} —
      ${ok?'✅ exakt':(tend?'➗ Tendenz richtig':'❌ daneben')}</div>`;
  }
  return `<div class="card">
    <div class="top">
      <div>
        <div class="teams">${p.home} <span style="color:var(--muted)">vs</span> ${p.away}</div>
        <div class="city">${p.city||''}</div>
      </div>
      <div style="text-align:right">
        <div class="score">${score}</div>
        <div class="conf ${confClass(p.confidence)}">${p.confidence}</div>
      </div>
    </div>
    <div class="bar">
      <span class="h" style="width:${pct(p.probs.home)}"></span>
      <span class="d" style="width:${pct(p.probs.draw)}"></span>
      <span class="a" style="width:${pct(p.probs.away)}"></span>
    </div>
    <div class="pl"><span>${pct(p.probs.home)}</span><span>${pct(p.probs.draw)}</span><span>${pct(p.probs.away)}</span></div>
    <div class="reason">${p.reasoning||''}</div>
    <div class="chips">${(p.key_factors||[]).map(f=>`<span class="chip">${f}</span>`).join('')}</div>
    ${p.upset_watch?`<div class="upset"><b>Überraschungs-Radar:</b> ${p.upset_watch}</div>`:''}
    ${resHtml}
    <div class="statline">Statistik-Modell: ${pct(sm.p_home)} / ${pct(sm.p_draw)} / ${pct(sm.p_away)}
      · λ ${sm.lambda_home}–${sm.lambda_away} · wahrscheinlichstes Ergebnis ${sm.top_scoreline||'–'}</div>
  </div>`;
}

// Meta
const m = D.meta||{};
document.getElementById('meta').textContent =
  `Datenbasis: ${m.n_historical_matches?.toLocaleString('de-DE')||'?'} Länderspiele `
  + `(${(m.history_range||[])[0]}–${(m.history_range||[])[1]}) · ${m.n_participants||48} Teilnehmer`;

// Cards grouped by date
const cardsEl = document.getElementById('cards');
let lastDate = null;
const fmt = d => new Date(d+'T00:00:00').toLocaleDateString('de-DE',{weekday:'long',day:'2-digit',month:'long'});
(D.predictions||[]).forEach(p=>{
  if(p.date!==lastDate){
    lastDate=p.date;
    cardsEl.insertAdjacentHTML('beforeend',`<div class="daterow">${fmt(p.date)}</div>`);
  }
  cardsEl.insertAdjacentHTML('beforeend', card(p));
});
if(!(D.predictions||[]).length){
  cardsEl.innerHTML = '<div class="daterow">Noch keine Vorhersagen — Briefing für den nächsten Spieltag folgt.</div>';
}

// Elo list
document.getElementById('elo').innerHTML = (D.elo_top||[]).map((e,i)=>
  `<div class="erow"><span class="r">${i+1}</span><span>${e.team}</span><span class="v">${Math.round(e.elo)}</span></div>`
).join('');

// Footer
const b = (D.batches||[])[0]||{};
document.getElementById('foot').innerHTML =
  `${b.oracle||'Claude-Orakel'} · Stand ${b.generated_at||''}<br>`
  + `Methode: ${b.method||''}<br>Nur für den privaten Gebrauch. 🤫`;
</script>
</body>
</html>
